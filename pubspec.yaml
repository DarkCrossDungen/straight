name: straight
description: "Free, private, offline voice dictation app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1

  # UUID Generation
  uuid: ^3.0.7

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Audio Capture
  record: ^7.1.0

  # Global Hotkey (desktop)
  hotkey_manager: ^0.2.3

  # Text Injection (Windows)
  win32: ^5.10.0

  # System Utilities
  path_provider: ^2.1.5
  window_manager: ^0.4.3
  system_tray: ^2.0.3

  # Download Manager
  http: ^1.3.0

  # FFI for native bindings
  ffi: ^2.1.4

  # UI
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/models/
    - assets/icons/
    - assets/fonts/
